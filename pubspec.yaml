name: textify
description: OCR app — scan text from camera or gallery using Google ML Kit.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Core OCR engine (Google ML Kit, offline, free) ──────────────────
  google_mlkit_text_recognition: ^0.15.0

  # ── Camera live preview ──────────────────────────────────────────────
  camera: ^0.11.0

  # ── Pick images from gallery ─────────────────────────────────────────
  image_picker: ^1.1.2

  # ── Runtime permission handling (camera, storage) ────────────────────
  permission_handler: ^11.3.1

  # ── Share extracted text to other apps ───────────────────────────────
  share_plus: ^10.0.0

  # ── Flutter default icons (already included, keeping explicit) ───────
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true